<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTOMATA — AGP Glass</title>
<style>
/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
:root {
  --bg:          #07090D;
  --surface:     #0F1720;
  --surface-2:   #182535;
  --border:      #1E3045;
  --border-2:    #2A4060;
  --accent:      #00B8D9;
  --accent-dim:  #005F70;
  --accent-glow: rgba(0,184,217,0.18);
  --text:        #E2EBF0;
  --text-2:      #7A9AAD;
  --text-3:      #3D5A6A;
  --danger:      #FF4558;
  --ok:          #00D68F;
  --warn:        #F0A500;

  --sidebar-w:   264px;
  --detail-w:    340px;
  --top-h:       52px;
  --radius:      6px;
  --radius-sm:   3px;
  --mono:        "SF Mono", "Cascadia Code", "Consolas", monospace;
  --sans:        -apple-system, "Segoe UI", system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════════ */
.topbar {
  height: var(--top-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 100;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo-mark {
  width: 28px;
  height: 28px;
  position: relative;
}

.logo-mark svg { width: 100%; height: 100%; }

.topbar-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--text);
  text-transform: uppercase;
}

.topbar-sub {
  font-size: 10px;
  color: var(--text-2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: -2px;
}

.topbar-sep {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-2);
  font-size: 12px;
  overflow: hidden;
  flex: 1;
}

.breadcrumb span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.breadcrumb .crumb-sep { color: var(--text-3); flex-shrink: 0; }
.breadcrumb .crumb-active { color: var(--text); }

.status-pills {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--text-2);
}

.pill .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text-3);
}

.pill.ok .dot   { background: var(--ok); box-shadow: 0 0 4px var(--ok); }
.pill.warn .dot { background: var(--warn); }
.pill.err .dot  { background: var(--danger); }

/* ═══════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════ */
.layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-section {
  padding: 12px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

/* La sección de vehículos puede crecer pero tiene scroll propio */
.sidebar-section.vehicles {
  flex-shrink: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
  max-height: 45%;
}

.section-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 8px;
  flex-shrink: 0;
}

.vehicle-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  overflow-y: auto;
  padding-right: 2px;
}

.vehicle-grid::-webkit-scrollbar { width: 3px; }
.vehicle-grid::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.vehicle-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--sans);
  letter-spacing: 0.04em;
  transition: all 0.15s;
  white-space: nowrap;
  height: fit-content;
}

.vehicle-btn:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
  background: rgba(0,184,217,0.06);
}

.vehicle-btn.active {
  background: rgba(0,184,217,0.12);
  border-color: var(--accent);
  color: var(--accent);
}

.search-wrap {
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  pointer-events: none;
}

#search {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--sans);
  font-size: 12px;
  padding: 6px 8px 6px 28px;
  outline: none;
  transition: border-color 0.15s;
}

#search:focus { border-color: var(--accent-dim); }
#search::placeholder { color: var(--text-3); }

.file-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}

.file-tree::-webkit-scrollbar { width: 4px; }
.file-tree::-webkit-scrollbar-track { background: transparent; }
.file-tree::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

.folder-group { margin-bottom: 2px; }

.folder-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  cursor: pointer;
  color: var(--text-2);
  font-size: 11px;
  user-select: none;
  transition: color 0.12s;
}

.folder-header:hover { color: var(--text); }

.folder-arrow {
  color: var(--text-3);
  transition: transform 0.2s;
  flex-shrink: 0;
}

.folder-group.open .folder-arrow { transform: rotate(90deg); }

.folder-name {
  flex: 1;
  font-size: 10.5px;
  letter-spacing: 0.03em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.folder-count {
  font-size: 9px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 1px 6px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}

.folder-files { display: none; }
.folder-group.open .folder-files { display: block; }

.file-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px 5px 28px;
  cursor: pointer;
  color: var(--text-2);
  font-size: 11px;
  border-left: 2px solid transparent;
  transition: all 0.12s;
  position: relative;
}

.file-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }

.file-item.active {
  background: var(--accent-glow);
  border-left-color: var(--accent);
  color: var(--accent);
}

.file-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--text-3);
  flex-shrink: 0;
}

.file-item.active .file-dot { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
.file-item.has-data .file-dot { background: var(--ok); }
.file-item.has-error .file-dot { background: var(--danger); }

.file-label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.type-badge {
  font-size: 8.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════
   CANVAS AREA
═══════════════════════════════════════════════ */
.canvas-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-3);
}

.empty-state svg { opacity: 0.25; }

.empty-label {
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* Loading */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(7,9,13,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 50;
  backdrop-filter: blur(4px);
}

.loading-overlay.hidden { display: none; }

.spinner-ring {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-msg {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
}

.loading-sub {
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.06em;
}

/* Plano viewer */
.plano-viewer {
  flex: 1;
  overflow: auto;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.plano-viewer::-webkit-scrollbar { width: 6px; height: 6px; }
.plano-viewer::-webkit-scrollbar-track { background: transparent; }
.plano-viewer::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

.plano-container {
  position: relative;
  display: inline-block;
  cursor: crosshair;
}

.plano-img {
  display: block;
  max-width: 100%;
  user-select: none;
  border-radius: var(--radius);
}

/* Cajetín overlays */
.cajetin-overlay {
  position: absolute;
  border: 1.5px solid rgba(0,184,217,0.4);
  border-radius: 3px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: rgba(0,184,217,0.04);
}

.cajetin-overlay:hover {
  border-color: var(--accent);
  background: rgba(0,184,217,0.12);
  z-index: 10;
}

.cajetin-overlay.selected {
  border-color: var(--accent);
  background: rgba(0,184,217,0.16);
  box-shadow: 0 0 0 1px var(--accent), 0 0 16px rgba(0,184,217,0.25);
  z-index: 20;
}

/* Lock-on pulse animation */
@keyframes lockOn {
  0%   { box-shadow: 0 0 0 0   rgba(0,184,217,0.8); }
  50%  { box-shadow: 0 0 0 8px rgba(0,184,217,0); }
  100% { box-shadow: 0 0 0 0   rgba(0,184,217,0); }
}

.cajetin-overlay.lock-on {
  animation: lockOn 0.4s ease-out;
}

/* Cajetín tooltip */
.cajetin-tooltip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  font-size: 10px;
  color: var(--accent);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: opacity 0.15s;
}

.cajetin-overlay:hover .cajetin-tooltip { opacity: 1; }

/* Canvas toolbar */
.canvas-toolbar {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  flex-shrink: 0;
}

.tool-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--sans);
  letter-spacing: 0.04em;
  transition: all 0.15s;
}

.tool-btn:hover { border-color: var(--border-2); color: var(--text); }

.tool-btn.primary {
  background: rgba(0,184,217,0.1);
  border-color: var(--accent-dim);
  color: var(--accent);
}

.tool-btn.primary:hover {
  background: rgba(0,184,217,0.18);
  border-color: var(--accent);
}

.toolbar-info {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  font-variant-numeric: tabular-nums;
}

/* ═══════════════════════════════════════════════
   DETAIL PANEL
═══════════════════════════════════════════════ */
.detail-panel {
  width: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow: hidden;
  transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}

.detail-panel.open { width: var(--detail-w); }

.detail-inner {
  width: var(--detail-w);
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.detail-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.detail-title-wrap {}

.detail-eyebrow {
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}

.detail-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.detail-close {
  background: none;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  padding: 2px;
  line-height: 0;
  transition: color 0.12s;
  flex-shrink: 0;
  margin-top: 2px;
}

.detail-close:hover { color: var(--text); }

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
}

.detail-body::-webkit-scrollbar { width: 4px; }
.detail-body::-webkit-scrollbar-track { background: transparent; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

/* Field rows */
.field-section-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 16px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.field-section-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border);
}

.field-section-label:first-child { margin-top: 0; }

.field-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(30,48,69,0.5);
}

.field-row:last-child { border-bottom: none; }

.field-name {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-2);
  flex-shrink: 0;
  padding-top: 1px;
}

.field-value {
  font-size: 13px;
  font-weight: 300;
  color: var(--text);
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  text-align: right;
  word-break: break-all;
}

/* Cajetín index chips */
.cajetin-index {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  font-size: 9px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

/* SAP images */
.sap-images {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 4px;
}

.sap-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  width: 100%;
  padding: 8px 12px;
  background: rgba(0,184,217,0.07);
  border: 1px solid var(--accent-dim);
  border-radius: var(--radius-sm);
  color: var(--accent);
  font-size: 11px;
  font-family: var(--sans);
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 4px;
}
.sap-btn:hover { background: rgba(0,184,217,0.14); border-color: var(--accent); }
.sap-btn.no-img {
  background: transparent;
  border-color: var(--border);
  color: var(--text-3);
  cursor: default;
}

/* ── Similares ───────────────────────────────── */
.similares-btn {
  display: flex; align-items: center; gap: 7px;
  width: 100%; padding: 8px 12px;
  background: rgba(139,92,246,0.08);
  border: 1px solid rgba(139,92,246,0.3);
  border-radius: var(--radius-sm);
  color: #a78bfa; font-size: 11px; font-family: var(--sans);
  letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s;
}
.similares-btn:hover { background: rgba(139,92,246,0.16); border-color: #a78bfa; }
.similares-btn:disabled { opacity: 0.4; cursor: default; }
.similares-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.similar-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 10px;
  cursor: pointer; transition: border-color 0.15s;
}
.similar-card:hover { border-color: var(--accent-dim); }
.similar-card-top {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;
}
.similar-score {
  font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums;
  color: var(--accent);
}
.similar-score.high  { color: #34d399; }
.similar-score.mid   { color: #fbbf24; }
.similar-score.low   { color: #f87171; }
.similar-vehiculo { font-size: 10px; color: var(--text-3); }
.similar-archivo  { font-size: 11px; color: var(--text-2); margin-bottom: 4px;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.similar-bars { display: flex; gap: 3px; }
.similar-bar-wrap { flex: 1; }
.similar-bar-label { font-size: 9px; color: var(--text-3); margin-bottom: 2px; }
.similar-bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.similar-bar-fill  { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.similares-loading { font-size: 11px; color: var(--text-3); padding: 8px 0; text-align: center; }

/* Modal de imagen SAP */
.img-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}
.img-modal.open { display: flex; }

.img-modal-inner {
  position: relative;
  max-width: 92vw;
  max-height: 86vh;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.img-modal img {
  max-width: 100%;
  max-height: 80vh;
  object-fit: contain;
  border-radius: 4px;
  border: 1px solid var(--border-2);
  display: block;
}

.img-modal-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.img-modal-label {
  font-size: 10px;
  color: var(--text-2);
  letter-spacing: 0.06em;
  font-family: var(--mono);
}

.img-modal-close {
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  color: var(--text-2);
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--sans);
  transition: all 0.13s;
}
.img-modal-close:hover { color: var(--text); border-color: var(--border); }

.img-modal-loading {
  color: var(--text-2);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}
.img-modal-spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

/* All cajetines list */
.cajetines-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.cajetin-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  cursor: pointer;

}

.cajetin-card:hover { border-color: var(--accent-dim); }

.cajetin-card-fields {

}

.field-chip {

}

/* ═══════════════════════════════════════════════
   SCROLLBAR global
═══════════════════════════════════════════════ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }

   UTILITIES

<!-- MODAL IMAGEN SAP -->

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const state = {
  vehiculo: null,
  planos: [],
  currentPlano: null,
  cajetines: [],
  selectedCajetin: null,
  zoom: 1,
  overlaysVisible: true,
  renderInfo: null,
  imagenesSap: [],
  planoId: null,
};

// ═══════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
const vehicleGrid    = $('vehicle-grid');
const fileTree       = $('file-tree');
const searchInput    = $('search');
const emptyState     = $('empty-state');
const loadingEl      = $('loading');
const loadingMsg     = $('loading-msg');
const loadingSub     = $('loading-sub');
const planoViewer    = $('plano-viewer');
const planoContainer = $('plano-container');
const planoImg       = $('plano-img');
const canvasToolbar  = $('canvas-toolbar');
const detailPanel    = $('detail-panel');
const detailTitle    = $('detail-title');
const detailEyebrow  = $('detail-eyebrow');
const detailBody     = $('detail-body');
const toolbarInfo    = $('toolbar-info');
const breadcrumb     = $('breadcrumb');

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
async function init() {
  checkStatus();
  loadVehiculos();

  $('detail-close').addEventListener('click', closeDetail);
  $('zoom-in').addEventListener('click', () => setZoom(state.zoom + 0.2));
  $('zoom-out').addEventListener('click', () => setZoom(state.zoom - 0.2));
  $('zoom-fit').addEventListener('click', fitZoom);
  $('btn-toggle-overlays').addEventListener('click', toggleOverlays);
  $('btn-all-cajetines').addEventListener('click', showAllCajetines);
  searchInput.addEventListener('input', filterTree);
}

// ═══════════════════════════════════════════════
//  STATUS CHECK
// ═══════════════════════════════════════════════
async function checkStatus() {
  try {
    const r = await fetch('/api/status');
    const s = await r.json();
    setPill('pill-net', s.servidor_red);
    setPill('pill-sap', s.sap_db);
    setPill('pill-oda', s.oda);
  } catch {
    setPill('pill-net', false);
    setPill('pill-sap', false);
    setPill('pill-oda', false);
  }
}

function setPill(id, ok) {
  const el = $(id);
  el.classList.remove('ok', 'warn', 'err');
  el.classList.add(ok ? 'ok' : 'err');
}

// ═══════════════════════════════════════════════
//  VEHICULOS
// ═══════════════════════════════════════════════
async function loadVehiculos() {
  vehicleGrid.innerHTML = '<div style="color:var(--text-3);font-size:11px;">Cargando...</div>';
  try {
    const r = await fetch('/api/vehiculos');
    const vehiculos = await r.json();
    vehicleGrid.innerHTML = '';
    vehiculos.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'vehicle-btn';
      btn.textContent = v;
      btn.addEventListener('click', () => selectVehiculo(v));
      vehicleGrid.appendChild(btn);
    });
  } catch (e) {
    vehicleGrid.innerHTML = '<div style="color:var(--danger);font-size:11px;">Error cargando vehículos</div>';
  }
}

async function selectVehiculo(vehiculo) {
  state.vehiculo = vehiculo;
  state.currentPlano = null;

  // Update button states
  vehicleGrid.querySelectorAll('.vehicle-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === vehiculo);
  });

  // Update breadcrumb
  setBreadcrumb([vehiculo]);

  // Load planos
  fileTree.innerHTML = '<div style="padding:16px 12px;color:var(--text-3);font-size:11px;">Cargando planos...</div>';
  try {
    const r = await fetch(`/api/vehiculos/${encodeURIComponent(vehiculo)}/planos`);
    state.planos = await r.json();
    renderTree(state.planos);
  } catch {
    fileTree.innerHTML = '<div style="padding:16px 12px;color:var(--danger);font-size:11px;">Error cargando planos</div>';
  }
}

// ═══════════════════════════════════════════════
//  FILE TREE
// ═══════════════════════════════════════════════
function renderTree(planos, filter = '') {
  const q = filter.toLowerCase();

  // Filtrar
  const filtered = filter
    ? planos.filter(p =>
        p.archivo.toLowerCase().includes(q) ||
        p.carpeta.toLowerCase().includes(q) ||
        (p.tipo || '').toLowerCase().includes(q))
    : planos;

  if (!filtered.length) {
    fileTree.innerHTML = '<div style="padding:16px 12px;color:var(--text-3);font-size:11px;text-align:center;">Sin resultados</div>';
    return;
  }

  // Construir árbol jerárquico desde carpeta_parts
  // nodo = { name, children: {}, files: [] }
  const root = { name: '', children: {}, files: [] };

  filtered.forEach(p => {
    const parts = p.carpeta_parts || (p.carpeta === '(raíz)' ? [] : p.carpeta.split('/'));
    let node = root;
    parts.forEach(part => {
      if (!node.children[part]) node.children[part] = { name: part, children: {}, files: [] };
      node = node.children[part];
    });
    node.files.push(p);
  });

  fileTree.innerHTML = '';
  renderNode(root, fileTree, 0);
}

function renderNode(node, container, depth) {
  // Archivos directos de este nodo
  node.files.forEach(p => {
    const indent = 12 + depth * 10;
    const item = document.createElement('div');
    item.className = 'file-item';
    item.dataset.archivo = p.archivo;
    item.dataset.carpeta = p.carpeta;
    item.style.paddingLeft = indent + 'px';
    item.innerHTML = `
      <div class="file-dot"></div>
      <span class="file-label" title="${p.carpeta}/${p.archivo}">${p.archivo}</span>
      ${p.tipo ? `<span class="type-badge">${p.tipo.split(' ')[0]}</span>` : ''}
    `;
    item.addEventListener('click', () => selectPlano(p));
    container.appendChild(item);
  });

  // Subcarpetas
  Object.entries(node.children).forEach(([name, child]) => {
    const totalFiles = countFiles(child);
    const indent = 12 + depth * 10;

    const group = document.createElement('div');
    group.className = 'folder-group open';

    const header = document.createElement('div');
    header.className = 'folder-header';
    header.style.paddingLeft = indent + 'px';
    header.innerHTML = `
      <svg class="folder-arrow" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="m9 18 6-6-6-6"/>
      </svg>
      <span class="folder-name" title="${name}">${name}</span>
      <span class="folder-count">${totalFiles}</span>
    `;
    header.addEventListener('click', () => group.classList.toggle('open'));

    const filesEl = document.createElement('div');
    filesEl.className = 'folder-files';
    renderNode(child, filesEl, depth + 1);

    group.appendChild(header);
    group.appendChild(filesEl);
    container.appendChild(group);
  });
}

function countFiles(node) {
  let c = node.files.length;
  Object.values(node.children).forEach(ch => c += countFiles(ch));
  return c;
}

function filterTree() {
  renderTree(state.planos, searchInput.value);
}

// ═══════════════════════════════════════════════
//  SELECT PLANO
// ═══════════════════════════════════════════════
async function selectPlano(plano) {
  state.currentPlano = plano;

  // Update file tree selection
  document.querySelectorAll('.file-item').forEach(el => {
    el.classList.toggle('active',
      el.dataset.archivo === plano.archivo && el.dataset.carpeta === plano.carpeta
    );
  });

  setBreadcrumb([state.vehiculo, plano.carpeta, plano.archivo]);

  // Show loading
  showLoading('Procesando plano', 'Convirtiendo DWG → DXF, esto puede tomar unos segundos...');
  emptyState.classList.add('hidden');
  planoViewer.classList.add('hidden');
  canvasToolbar.classList.add('hidden');
  closeDetail();

  try {
    const url = `/api/plano/${encodeURIComponent(plano.vehiculo)}/${encodeURIComponent(plano.carpeta)}/${encodeURIComponent(plano.archivo)}`;
    const r = await fetch(url);

    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    if (data.error && !data.render) {
      hideLoading();
      emptyState.classList.remove('hidden');
      emptyState.querySelector('.empty-label').textContent = `Error: ${data.error}`;
      return;
    }

    state.cajetines = data.cajetines || [];
    state.renderInfo = data.render || {};
    state.imagenesSap = data.imagenes_sap || [];
    state.planoId = data.plano_id || null;
    state.selectedCajetin = null;

    // Load the rendered image
    loadPlanoImage(data);

  } catch (e) {
    hideLoading();
    emptyState.classList.remove('hidden');
    emptyState.querySelector('.empty-label').textContent = `Error cargando plano: ${e.message}`;
  }
}

function loadPlanoImage(data) {
  if (!data.render || !data.render.png) {
    hideLoading();
    emptyState.classList.remove('hidden');
    emptyState.querySelector('.empty-label').textContent = 'Sin imagen renderizada';
    return;
  }

  const filename = data.render.png.split('\\').pop().split('/').pop();
  planoImg.src = `/renders/${encodeURIComponent(filename)}`;

  planoImg.onload = () => {
    hideLoading();
    emptyState.classList.add('hidden');
    planoViewer.classList.remove('hidden');
    canvasToolbar.classList.remove('hidden');

    // Set actual image dimensions
    state.imgW = planoImg.naturalWidth;
    state.imgH = planoImg.naturalHeight;

    // Reset zoom
    state.zoom = 1;
    applyZoom();

    // Draw cajetín overlays
    drawOverlays(data.cajetines || []);

    // Toolbar info
    toolbarInfo.textContent = `${data.cajetines?.length || 0} cajetines encontrados`;

    // Show all cajetines in detail panel automatically if there are results
    if (data.cajetines && data.cajetines.length > 0) {
      showAllCajetines();
    }
  };

  planoImg.onerror = () => {
    hideLoading();
    emptyState.classList.remove('hidden');
    emptyState.querySelector('.empty-label').textContent = 'Error cargando imagen del plano';
  };
}

// ═══════════════════════════════════════════════
//  OVERLAYS
// ═══════════════════════════════════════════════
function drawOverlays(cajetines) {
  // Remove old overlays
  planoContainer.querySelectorAll('.cajetin-overlay').forEach(el => el.remove());

  if (!cajetines.length) return;

  const renderInfo = state.renderInfo;
  const dxfW = (renderInfo.dxf_bounds?.[2] || 1) - (renderInfo.dxf_bounds?.[0] || 0);
  const dxfH = (renderInfo.dxf_bounds?.[3] || 1) - (renderInfo.dxf_bounds?.[1] || 0);
  const imgW  = renderInfo.width_px  || state.imgW  || 3000;
  const imgH  = renderInfo.height_px || state.imgH  || 1800;

  cajetines.forEach((caj, idx) => {
    const overlay = document.createElement('div');
    overlay.className = 'cajetin-overlay';
    overlay.dataset.id = caj.id;

    // Use precomputed pixel positions if available
    if (caj.bbox_px) {
      const bp = caj.bbox_px;
      overlay.style.left   = (bp.left  / imgW * 100) + '%';
      overlay.style.top    = (bp.top   / imgH * 100) + '%';
      overlay.style.width  = (bp.width / imgW * 100) + '%';
      overlay.style.height = (bp.height/ imgH * 100) + '%';
    } else if (caj.bbox) {
      // Fallback: compute from DXF bounds
      const xMin = renderInfo.dxf_bounds?.[0] || 0;
      const yMin = renderInfo.dxf_bounds?.[1] || 0;
      const lp = (caj.bbox[0] - xMin) / dxfW * 100;
      const tp = (1 - (caj.bbox[3] - yMin) / dxfH) * 100;
      const wp = (caj.bbox[2] - caj.bbox[0]) / dxfW * 100;
      const hp = (caj.bbox[3] - caj.bbox[1]) / dxfH * 100;
      overlay.style.left   = lp + '%';
      overlay.style.top    = tp + '%';
      overlay.style.width  = Math.max(wp, 2) + '%';
      overlay.style.height = Math.max(hp, 1) + '%';
    } else {
      return; // No position info, skip
    }

    // Tooltip
    const fieldNames = Object.keys(caj.campos).join(' · ');
    const tooltip = document.createElement('div');
    tooltip.className = 'cajetin-tooltip';
    tooltip.textContent = fieldNames || `Cajetín ${caj.id + 1}`;
    overlay.appendChild(tooltip);

    overlay.addEventListener('click', (e) => {
      e.stopPropagation();
      selectCajetin(caj);
    });

    planoContainer.appendChild(overlay);
  });
}

function toggleOverlays() {
  state.overlaysVisible = !state.overlaysVisible;
  planoContainer.querySelectorAll('.cajetin-overlay').forEach(el => {
    el.style.display = state.overlaysVisible ? '' : 'none';
  });
  $('btn-toggle-overlays').style.opacity = state.overlaysVisible ? '1' : '0.5';
}

// ═══════════════════════════════════════════════
//  CAJETÍN SELECTION
// ═══════════════════════════════════════════════
function selectCajetin(caj) {
  state.selectedCajetin = caj;

  // Update overlay states
  planoContainer.querySelectorAll('.cajetin-overlay').forEach(el => {
    const isSelected = parseInt(el.dataset.id) === caj.id;
    el.classList.toggle('selected', isSelected);
    if (isSelected) {
      el.classList.remove('lock-on');
      void el.offsetWidth; // reflow
      el.classList.add('lock-on');
    }
  });

  // Update cajetín cards in list
  document.querySelectorAll('.cajetin-card').forEach(card => {
    card.classList.toggle('selected', parseInt(card.dataset.id) === caj.id);
  });

  // Open detail panel
  openDetail(caj);
}

function openDetail(caj) {
  const fieldLabels = Object.keys(caj.campos);
  detailPanel.classList.add('open');
  detailEyebrow.textContent = `Cajetín ${caj.id + 1} · ${fieldLabels.length} campos`;
  detailTitle.textContent = fieldLabels.join(' / ') || 'Sin campos';

  detailBody.innerHTML = '';

  // Fields section
  const secLabel = document.createElement('div');
  secLabel.className = 'field-section-label';
  secLabel.textContent = 'Datos técnicos';
  detailBody.appendChild(secLabel);

  Object.entries(caj.campos).forEach(([nombre, valor]) => {
    const row = document.createElement('div');
    row.className = 'field-row';
    row.innerHTML = `
      <span class="field-name">${nombre}</span>
      <span class="field-value">${valor}</span>
    `;
    detailBody.appendChild(row);
  });

  // Position section
  const posLabel = document.createElement('div');
  posLabel.className = 'field-section-label';
  posLabel.textContent = 'Posición en plano';
  detailBody.appendChild(posLabel);

  const posRow = document.createElement('div');
  posRow.className = 'field-row';
  posRow.innerHTML = `
    <span class="field-name">Coord. DXF</span>
    <span class="field-value">X ${caj.x.toFixed(0)} · Y ${caj.y.toFixed(0)}</span>
  `;
  detailBody.appendChild(posRow);
}

function closeDetail() {
  detailPanel.classList.remove('open');
  state.selectedCajetin = null;
  planoContainer.querySelectorAll('.cajetin-overlay').forEach(el => {
    el.classList.remove('selected');
  });
  document.querySelectorAll('.cajetin-card').forEach(el => {
    el.classList.remove('selected');
  });
}

// Show all cajetines in detail panel as a list
function showAllCajetines() {
  detailPanel.classList.add('open');
  detailEyebrow.textContent = state.currentPlano?.archivo || 'Plano';
  detailTitle.textContent = `${state.cajetines.length} cajetines`;

  detailBody.innerHTML = '';

  if (!state.cajetines.length) {
    detailBody.innerHTML = '<div style="color:var(--text-3);font-size:11px;padding:8px 0;">No se encontraron cajetines con datos técnicos</div>';
    return;
  }

  // File info
  const infoLabel = document.createElement('div');
  infoLabel.className = 'field-section-label';
  infoLabel.textContent = 'Archivo';
  detailBody.appendChild(infoLabel);

  const fileRow = document.createElement('div');
  fileRow.className = 'field-row';
  fileRow.innerHTML = `
    <span class="field-name">Nombre</span>
    <span class="field-value" style="font-size:11px;">${state.currentPlano?.archivo || '—'}</span>
  `;
  detailBody.appendChild(fileRow);

  const carpetaRow = document.createElement('div');
  carpetaRow.className = 'field-row';
  carpetaRow.innerHTML = `
    <span class="field-name">Carpeta</span>
    <span class="field-value" style="font-size:11px;">${state.currentPlano?.carpeta || '—'}</span>
  `;
  detailBody.appendChild(carpetaRow);

  // Cajetines list
  const cajLabel = document.createElement('div');
  cajLabel.className = 'field-section-label';
  cajLabel.textContent = 'Cajetines técnicos';
  detailBody.appendChild(cajLabel);

  const list = document.createElement('div');
  list.className = 'cajetines-list';

  state.cajetines.forEach(caj => {
    const card = document.createElement('div');
    card.className = 'cajetin-card';
    card.dataset.id = caj.id;

    const header = document.createElement('div');
    header.className = 'cajetin-card-header';
    header.innerHTML = `
      <div class="cajetin-index">${caj.id + 1}</div>
      <span style="font-size:11px;color:var(--text-2);">${Object.keys(caj.campos).join(' · ')}</span>
    `;

    const chips = document.createElement('div');
    chips.className = 'cajetin-card-fields';
    Object.entries(caj.campos).forEach(([k, v]) => {
      const chip = document.createElement('span');
      chip.className = 'field-chip';
      chip.textContent = `${k}: ${v}`;
      chips.appendChild(chip);
    });

    card.appendChild(header);
    card.appendChild(chips);
    card.addEventListener('click', () => selectCajetin(caj));
    list.appendChild(card);
  });

  detailBody.appendChild(list);

  // SAP images section
  const sapLabel = document.createElement('div');
  sapLabel.className = 'field-section-label';
  sapLabel.textContent = 'Plano SAP';
  detailBody.appendChild(sapLabel);

  if (state.imagenesSap && state.imagenesSap.length > 0) {
    state.imagenesSap.forEach(img => {
      const btn = document.createElement('button');
      btn.className = 'sap-btn';
      const docName = img.documento || img.plano?.split('\\').pop() || 'Ver imagen';
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> ${docName}`;
      btn.addEventListener('click', () => openSapModal(img.plano_url, docName));
      detailBody.appendChild(btn);
    });
  } else {
    const noImg = document.createElement('button');
    noImg.className = 'sap-btn no-img';
    noImg.disabled = true;
    noImg.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Plano no disponible en SAP`;
    detailBody.appendChild(noImg);
  }

  // Sección similares
  const simLabel = document.createElement('div');
  simLabel.className = 'field-section-label';
  simLabel.textContent = 'Planos similares';
  detailBody.appendChild(simLabel);

  const simContainer = document.createElement('div');
  simContainer.id = 'similares-container';

  if (state.planoId) {
    const simBtn = document.createElement('button');
    simBtn.className = 'similares-btn';
    simBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Buscar planos similares`;
    simBtn.addEventListener('click', () => cargarSimilares(state.planoId, simContainer, simBtn));
    simContainer.appendChild(simBtn);
  } else {
    simContainer.innerHTML = '<div class="similares-loading">Plano no indexado aún — indexar primero para comparar</div>';
  }
  detailBody.appendChild(simContainer);
}

// ═══════════════════════════════════════════════
//  SIMILARES
// ═══════════════════════════════════════════════
async function cargarSimilares(planoId, container, btn) {
  btn.disabled = true;
  btn.textContent = 'Buscando...';
  container.innerHTML = '<div class="similares-loading">Calculando similitud...</div>';

  try {
    const res = await fetch(`/api/similares/${planoId}?top=8`);
    const data = await res.json();

    container.innerHTML = '';
    if (!data.length) {
      container.innerHTML = '<div class="similares-loading">No se encontraron planos similares indexados</div>';
      return;
    }

    const list = document.createElement('div');
    list.className = 'similares-list';

    data.forEach(s => {
      const pct = Math.round(s.score_total * 100);
      const scoreClass = pct >= 70 ? 'high' : pct >= 40 ? 'mid' : 'low';

      const card = document.createElement('div');
      card.className = 'similar-card';
      card.innerHTML = `
        <div class="similar-card-top">
          <span class="similar-score ${scoreClass}">${pct}%</span>
          <span class="similar-vehiculo">${s.vehiculo}</span>
        </div>
        <div class="similar-archivo">${s.archivo}</div>
        <div class="similar-bars">
          ${[['Caj', s.score_cajetines], ['Rad', s.score_radios], ['Cot', s.score_cotas], ['Geo', s.score_geometria]].map(([lbl, v]) => `
            <div class="similar-bar-wrap">
              <div class="similar-bar-label">${lbl} ${Math.round(v*100)}%</div>
              <div class="similar-bar-track"><div class="similar-bar-fill" style="width:${Math.round(v*100)}%"></div></div>
            </div>`).join('')}
        </div>
      `;
      // Click → abrir ese plano
      card.addEventListener('click', () => {
        const planoInfo = state.planos.find(p => p.archivo === s.archivo && p.vehiculo === s.vehiculo);
        if (planoInfo) {
          selectPlano(planoInfo);
        }
      });
      list.appendChild(card);
    });

    container.appendChild(list);
  } catch (e) {
    container.innerHTML = '<div class="similares-loading">Error al buscar similares</div>';
    console.error(e);
  }
}

// ═══════════════════════════════════════════════
//  SAP IMAGE MODAL
// ═══════════════════════════════════════════════
const imgModal      = $('img-modal');
const imgModalImg   = $('img-modal-img');
const imgModalLabel = $('img-modal-label');
const imgModalClose = $('img-modal-close');
const imgModalLoad  = $('img-modal-loading');

function openSapModal(url, label) {
  imgModalLabel.textContent = label || '';
  imgModalImg.style.display = 'none';
  imgModalLoad.style.display = 'flex';
  imgModal.classList.add('open');

  imgModalImg.onload = () => {
    imgModalLoad.style.display = 'none';
    imgModalImg.style.display = 'block';
  };
  imgModalImg.onerror = () => {
    imgModalLoad.innerHTML = '<span style="color:var(--accent-warn,#f59e0b);">No se pudo cargar la imagen desde SAP</span>';
  };
  imgModalImg.src = url;
}

function closeSapModal() {
  imgModal.classList.remove('open');
  imgModalImg.src = '';
}

imgModalClose.addEventListener('click', closeSapModal);
imgModal.addEventListener('click', e => { if (e.target === imgModal) closeSapModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSapModal(); });

// ═══════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════
function setZoom(z) {
  state.zoom = Math.min(4, Math.max(0.2, z));
  applyZoom();
}

function applyZoom() {
  planoImg.style.width = (state.imgW * state.zoom) + 'px';
  planoImg.style.height = (state.imgH * state.zoom) + 'px';
  planoContainer.style.width = (state.imgW * state.zoom) + 'px';
  planoContainer.style.height = (state.imgH * state.zoom) + 'px';
  $('zoom-val').textContent = Math.round(state.zoom * 100) + '%';
}

function fitZoom() {
  const viewerRect = planoViewer.getBoundingClientRect();
  const scaleW = (viewerRect.width  - 32) / state.imgW;
  const scaleH = (viewerRect.height - 32) / state.imgH;
  setZoom(Math.min(scaleW, scaleH));
}

// Mouse wheel zoom
document.addEventListener('wheel', (e) => {
  if (!planoViewer.classList.contains('hidden') && e.target.closest('#plano-viewer')) {
    e.preventDefault();
    setZoom(state.zoom + (e.deltaY < 0 ? 0.1 : -0.1));
  }
}, { passive: false });

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function showLoading(msg, sub) {
  loadingMsg.textContent = msg;
  loadingSub.textContent = sub || '';
  loadingEl.classList.remove('hidden');
}

function hideLoading() {
  loadingEl.classList.add('hidden');
}

function setBreadcrumb(parts) {
  breadcrumb.innerHTML = parts.map((p, i) => {
    const isLast = i === parts.length - 1;
    return `${i > 0 ? '<span class="crumb-sep">›</span>' : ''}<span class="${isLast ? 'crumb-active' : ''}">${p}</span>`;
  }).join('');
}

// ═══════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════
init();
</script>
